<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>{{ title }}</title>

    <meta name="description" content="{{ description }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% if canonical %}
    <link rel="canonical" href="{{ canonical }}">
    {% endif %}

    <!-- =========================
         SEO / SCHEMA BLOCKS
    ========================== -->

    {% if schema_website %}
    <script type="application/ld+json">
    {{ schema_website | safe }}
    </script>
    {% endif %}

    {% if schema_org %}
    <script type="application/ld+json">
    {{ schema_org | safe }}
    </script>
    {% endif %}

    {% if schema_collection %}
    <script type="application/ld+json">
    {{ schema_collection | safe }}
    </script>
    {% endif %}

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f6f6f6;
            color: #222;
            line-height: 1.6;
        }

        header {
            background: #111;
            color: #fff;
            padding: 25px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        nav {
            padding: 15px;
            background: #fff;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            border-bottom: 1px solid #ddd;
        }

        nav a {
            text-decoration: none;
            background: #eee;
            color: #333;
            padding: 6px 10px;
            border-radius: 5px;
            font-size: 14px;
        }

        nav a:hover {
            background: #ff6600;
            color: #fff;
        }

        main {
            max-width: 1000px;
            margin: 30px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
        }

        .cta {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 20px;
            background: #ff6600;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
        }

        .cta:hover {
            background: #e65500;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>

<body>

<header>
    <h1>{{ site_name }}</h1>
    <p>{{ title }}</p>
</header>

<!-- =========================
     NAVIGATION (HREFLANG OR SILO)
========================== -->
<nav>
    {{ hreflang | safe }}
</nav>

<!-- =========================
     PAGE CONTENT
========================== -->
<main>

    <div class="content">
        {{ content | safe }}
    </div>

    <a class="cta" href="#">
        Shop Now
    </a>

</main>

<footer>
    © {{ site_name }} - 2026 All Rights Reserved
</footer>

</body>
</html>
