name: Daily Programmatic Index Sync

on:
  schedule:
    # Runs automatically every single day at 05:00 UTC (1:00 AM EST)
    - cron: '0 5 * * *'
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual override run from the GitHub Actions dashboard

permissions:
  contents: write

jobs:
  run-vulture-engine:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Set up Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Execute Site Generator Engine
      run: |
        chmod +x build.py
        python build.py

    - name: Inject Daily Velocity Heartbeat
      run: |
        # Generates a persistent timestamp to guarantee a code delta for indexing pings
        echo "Last Vulture Run Sync: $(date -u)" > heartbeat.txt

    - name: Commit and Push High Velocity Asset Pages
      run: |
        git config --global user.name "Vulture Automation Engine"
        git config --global user.email "automation@brightlane.dev"
        
        # Stage all updated HTML files and the heartbeat file
        git add *.html heartbeat.txt
        
        # Check for modifications or new assets
        if git diff-index --quiet HEAD --; then
          echo "No structural layout deltas detected today."
        else
          git commit -m "Vulture Index Velocity Sync: $(date +'%Y-%m-%d') [Build $GITHUB_RUN_NUMBER]"
          git push origin main
        fi
