name: Cleanup Root HTML Files

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Delete all root HTML files
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git rm -f *.html || echo "no html files"
          git commit -m "Remove old static HTML files from root" || echo "nothing to commit"
          git push origin main
